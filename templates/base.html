<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{% block title %}IELTS Prep{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<style>
:root {
  --brand:       #1a6bff;
  --brand-light: #e8f0ff;
  --brand-dark:  #0d4fd6;
  --success:     #12b76a;
  --danger:      #f04438;
  --warning:     #f79009;
  --surface:     #ffffff;
  --surface-2:   #f7f8fc;
  --border:      #e4e7f0;
  --text-primary:   #101828;
  --text-secondary: #667085;
  --text-muted:     #98a2b3;
  --shadow-sm: 0 1px 3px rgba(16,24,40,.08), 0 1px 2px rgba(16,24,40,.06);
  --shadow-md: 0 4px 16px rgba(16,24,40,.10);
  --radius: 12px;
  --radius-sm: 8px;
}
*, *::before, *::after { box-sizing: border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--surface-2);
  color: var(--text-primary);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}
/* ── Navbar ── */
.navbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
  height: 60px;
  box-shadow: var(--shadow-sm);
}
.navbar-brand {
  font-weight: 700;
  font-size: 1.1rem;
  color: var(--brand) !important;
  display: flex;
  align-items: center;
  gap: .4rem;
  letter-spacing: -.3px;
}
.nav-link { color: var(--text-secondary) !important; font-weight: 500; font-size: .9rem; }
.nav-link:hover { color: var(--brand) !important; }
.nav-link.active { color: var(--text-primary) !important; }

/* ── Cards ── */
.card {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  background: var(--surface);
}
.card-header {
  background: transparent;
  border-bottom: 1px solid var(--border);
  font-weight: 600;
  font-size: .95rem;
  padding: 1rem 1.25rem;
}

/* ── Buttons ── */
.btn { font-weight: 500; border-radius: var(--radius-sm); font-size: .875rem; }
.btn-primary { background: var(--brand); border-color: var(--brand); }
.btn-primary:hover { background: var(--brand-dark); border-color: var(--brand-dark); }
.btn-outline-primary { color: var(--brand); border-color: var(--brand); }
.btn-outline-primary:hover { background: var(--brand); border-color: var(--brand); }
.btn-sm { padding: .3rem .7rem; font-size: .8rem; }

/* ── Forms ── */
.form-control, .form-select {
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  font-family: inherit;
  font-size: .9rem;
  color: var(--text-primary);
  transition: border .15s, box-shadow .15s;
}
.form-control:focus, .form-select:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(26,107,255,.12);
}
label { font-weight: 500; font-size: .85rem; color: var(--text-secondary); margin-bottom: .3rem; }

/* ── Badges ── */
.badge { font-weight: 500; font-size: .75rem; border-radius: 6px; }
.badge-brand { background: var(--brand-light); color: var(--brand); }

/* ── Tables ── */
.table th { font-size: .8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; }
.table td { font-size: .875rem; vertical-align: middle; color: var(--text-primary); }
.table-hover tbody tr:hover { background: var(--surface-2); }

/* ── Utility ── */
.text-brand { color: var(--brand) !important; }
.bg-brand-light { background: var(--brand-light) !important; }
.page-title { font-weight: 700; font-size: 1.4rem; letter-spacing: -.4px; }
.page-sub { color: var(--text-secondary); font-size: .9rem; }
.divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
.chip {
  display: inline-flex; align-items: center; gap: .3rem;
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 99px; padding: .2rem .65rem;
  font-size: .78rem; font-weight: 500; color: var(--text-secondary);
}
</style>
{% block head %}{% endblock %}
</head>
<body>

{% if session.user_id %}
<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">
      <i class="bi bi-headphones"></i> IELTSLift
    </a>
    <div class="ms-auto d-flex align-items-center gap-3">
      {% if session.is_admin %}
      <a class="nav-link {% if request.endpoint == 'admin_dashboard' %}active{% endif %}" href="/admin">
        <i class="bi bi-grid"></i> Dashboard
      </a>
      <a class="nav-link {% if request.endpoint == 'admin_users' %}active{% endif %}" href="/admin/users">
        <i class="bi bi-people"></i> Users
      </a>
      {% else %}
      <a class="nav-link {% if request.endpoint == 'user_dashboard' %}active{% endif %}" href="/dashboard">
        <i class="bi bi-grid"></i> Tests
      </a>
      {% endif %}
      <span class="chip"><i class="bi bi-person"></i> {{ session.email }}</span>
      <a href="/logout" class="btn btn-sm btn-outline-primary">Log out</a>
    </div>
  </div>
</nav>
{% endif %}

<main class="{% if session.user_id %}py-4{% endif %}">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
